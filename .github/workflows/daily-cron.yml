# Daily RSS + story drip — runs in GitHub, commits manifest, triggers Pages redeploy.

name: Daily automation

on:
  schedule:
    # 00:30 UTC = 6:00 AM IST
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily automation
        working-directory: backend
        env:
          PYTHONPATH: .
          UPLOADS_DIR: uploads
        run: python scripts/daily_automation.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/uploads/articles_manifest.json \
                  backend/uploads/automation_state.json \
                  backend/uploads/images/rss || true
          if git diff --staged --quiet; then
            echo "No content changes today."
            exit 0
          fi
          git commit -m "chore: daily RSS and story update [automated]"
          git push
