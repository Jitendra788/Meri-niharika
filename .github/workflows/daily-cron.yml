# Daily RSS import → commit → rebuild GitHub Pages (live site update).

name: Daily update and deploy

on:
  schedule:
    # 00:30 UTC = 6:00 AM IST
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily automation (RSS news)
        working-directory: backend
        env:
          PYTHONPATH: .
          UPLOADS_DIR: uploads
        run: python scripts/daily_automation.py

      - name: Commit and push if content changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/uploads/articles_manifest.json \
                  backend/uploads/automation_state.json \
                  backend/uploads/images/rss || true
          if git diff --staged --quiet; then
            echo "No new articles today."
            exit 0
          fi
          git commit -m "chore: daily RSS update [automated]"
          git push

  deploy:
    needs: daily-update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/magazine-web/package-lock.json

      - name: Sync articles + images into public/
        run: node frontend/magazine-web/scripts/sync-static-data.mjs

      - name: Build Angular for GitHub Pages
        working-directory: frontend/magazine-web
        run: |
          npm ci
          npx ng build --configuration=production,github-pages

      - name: SPA fallback for GitHub Pages
        run: |
          OUT=frontend/magazine-web/dist/magazine-web/browser
          cp "$OUT/index.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/magazine-web/dist/magazine-web/browser

      - id: deployment
        uses: actions/deploy-pages@v4
